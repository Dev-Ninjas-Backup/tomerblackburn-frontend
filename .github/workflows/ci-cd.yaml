name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches:
            - "**"

jobs:
    ci-check:
        name: Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm ci

            # - name: Lint
              # run: npm run lint

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: ci-check
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and Push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
                  build-args: |
                      NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
                  cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache
                  cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache,mode=max

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build-and-push
        if: github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Copy Compose File
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  password: ${{ secrets.VPS_PASSWORD }}
                  source: "docker-compose.yml"
                  target: "/home/${{ secrets.VPS_USER }}/frontend"

            # - name: Copy Caddy File
            #   uses: appleboy/scp-action@v0.1.7
            #   with:
            #       host: ${{ secrets.VPS_HOST }}
            #       username: ${{ secrets.VPS_USER }}
            #       password: ${{ secrets.VPS_PASSWORD }}
            #       source: "Caddyfile"
            #       target: "/home/${{ secrets.VPS_USER }}/frontend"

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  password: ${{ secrets.VPS_PASSWORD }}
                  script: |
                      cd ~/frontend
                      sudo docker compose --profile prod pull
                      sudo docker compose --profile prod down
                      sudo docker compose --profile prod up -d
                      sudo docker system prune -f
